{% extends '_base.html' %}
{% block title %}Оформление заказа — IWS{% endblock %}
{% block content %}

<div style="max-width:560px;margin:0 auto;">
    <h1 style="font-size:28px;font-weight:bold;margin-bottom:32px;">Оформление <span style="color:#7c3aed;">заказа</span></h1>

    <form method="post" action="/checkout">
        <div style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:24px;">
            <h2 style="font-size:18px;font-weight:bold;margin-bottom:20px;">Данные получателя</h2>

            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Имя *</label>
                <input type="text" name="name" required style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Телефон *</label>
                <input type="tel" name="phone" required style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Email</label>
                <input type="email" name="email" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:0;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Адрес доставки</label>
                <textarea name="address" rows="3" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;resize:none;"></textarea>
            </div>
        </div>

        <div style="background:#f3e8ff;border-radius:12px;padding:20px;margin-bottom:24px;font-size:14px;color:#6d28d9;">
            Оплата и доставка обсуждаются после оформления заказа. Мы свяжемся с вами.
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;font-size:16px;padding:14px;">Оформить заказ</button>
    </form>
</div>

{% endblock %}
