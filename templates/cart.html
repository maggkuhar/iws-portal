{% extends '_base.html' %}
{% block title %}Корзина — IWS{% endblock %}
{% block content %}

<h1 style="font-size:28px;font-weight:bold;margin-bottom:32px;">Корзина</h1>

<div id="cart-content">
    <div style="text-align:center;padding:60px;color:#aaa;" id="empty-msg">
        <div style="font-size:48px;margin-bottom:16px;">🛒</div>
        <div style="margin-bottom:24px;">Корзина пуста</div>
        <a href="/shop" class="btn btn-primary">Перейти в магазин</a>
    </div>
</div>

{% endblock %}
{% block extra_js %}
<script>
// Загрузить корзину из сессии через отдельный запрос не можем без API,
// поэтому показываем кнопку перехода к оформлению если есть товары в счётчике
const cnt = document.querySelector('.cart-count');
if (cnt && parseInt(cnt.textContent) > 0) {
    document.getElementById('empty-msg').innerHTML = `
        <div style="font-size:48px;margin-bottom:16px;">🛒</div>
        <div style="margin-bottom:8px;font-size:18px;font-weight:bold;">Товары добавлены</div>
        <div style="color:#888;margin-bottom:24px;">Перейдите к оформлению</div>
        <a href="/checkout" class="btn btn-primary">Оформить заказ</a>
        <div style="margin-top:16px;"><a href="/shop" style="color:#7c3aed;font-size:13px;">← Продолжить покупки</a></div>
    `;
}
</script>
{% endblock %}
