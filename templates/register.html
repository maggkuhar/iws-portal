{% extends '_base.html' %}
{% block title %}Регистрация — IWS{% endblock %}
{% block content %}

<div style="max-width:440px;margin:0 auto;">
    <h1 style="font-size:28px;font-weight:bold;margin-bottom:8px;text-align:center;">Регистрация</h1>
    <p style="text-align:center;color:#888;margin-bottom:32px;">Уже есть аккаунт? <a href="/login" style="color:#7c3aed;">Войти</a></p>

    <div style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
        <form method="post" action="/register">
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Имя *</label>
                <input type="text" name="name" required style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Email *</label>
                <input type="email" name="email" required style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Телефон</label>
                <input type="tel" name="phone" style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Город</label>
                <input type="text" name="city" style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <div style="margin-bottom:28px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Пароль *</label>
                <input type="password" name="password" required minlength="6" style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;font-size:16px;padding:13px;">Создать аккаунт</button>
        </form>
    </div>
</div>

{% endblock %}
