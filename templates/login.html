{% extends '_base.html' %}
{% block title %}Войти — IWS{% endblock %}
{% block content %}

<div style="max-width:400px;margin:0 auto;">
    <h1 style="font-size:28px;font-weight:bold;margin-bottom:8px;text-align:center;">Войти</h1>
    <p style="text-align:center;color:#888;margin-bottom:32px;">Нет аккаунта? <a href="/register" style="color:#7c3aed;">Зарегистрироваться</a></p>

    <div style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
        <form method="post" action="/login">
            <div style="margin-bottom:20px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Email</label>
                <input type="email" name="email" required autofocus style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;outline:none;" onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#e5e7eb'">
            </div>
            <div style="margin-bottom:28px;">
                <label style="display:block;font-size:13px;color:#666;margin-bottom:6px;">Пароль</label>
                <input type="password" name="password" required style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;outline:none;" onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#e5e7eb'">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;font-size:16px;padding:13px;">Войти</button>
        </form>
    </div>
</div>

{% endblock %}
